<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="spaceBg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" style="stop-color:#0f1729"/>
      <stop offset="100%" style="stop-color:#050810"/>
    </radialGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
    <linearGradient id="activeTab" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a3a3a"/>
      <stop offset="100%" style="stop-color:#0f2e2e"/>
    </linearGradient>
  </defs>

  <!-- Space Background -->
  <rect width="800" height="500" fill="url(#spaceBg)"/>

  <!-- Stars -->
  <circle cx="80" cy="60" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="200" cy="30" r="1" fill="white" opacity="0.4"/>
  <circle cx="350" cy="80" r="1" fill="white" opacity="0.5"/>
  <circle cx="500" cy="20" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="650" cy="55" r="1" fill="white" opacity="0.4"/>
  <circle cx="720" cy="100" r="1" fill="white" opacity="0.6"/>
  <circle cx="130" cy="150" r="1" fill="white" opacity="0.3"/>
  <circle cx="600" cy="140" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="750" cy="200" r="1" fill="white" opacity="0.4"/>
  <circle cx="50" cy="280" r="1" fill="white" opacity="0.6"/>
  <circle cx="760" cy="380" r="1" fill="white" opacity="0.5"/>
  <circle cx="40" cy="420" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="780" cy="450" r="1" fill="white" opacity="0.6"/>

  <!-- Sidebar bands (background gradient effect) -->
  <rect x="0" y="0" width="200" height="500" fill="#0a1020" opacity="0.5"/>
  <rect x="600" y="0" width="200" height="500" fill="#0a1020" opacity="0.5"/>

  <!-- Top Nav -->
  <rect x="200" y="0" width="400" height="50" fill="transparent"/>
  <circle cx="230" cy="26" r="14" fill="#14b8a6" opacity="0.2"/>
  <text x="222" y="31" font-family="Arial" font-size="11" fill="#14b8a6" font-weight="bold">Y</text>
  <text x="250" y="22" font-family="Arial" font-size="12" fill="#94a3b8">Yüksel</text>
  <text x="300" y="22" font-family="Arial" font-size="12" fill="#475569">Geçmiş</text>
  <text x="360" y="22" font-family="Arial" font-size="12" fill="#475569">Çıkış</text>
  <rect x="556" y="10" width="30" height="30" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="566" y="29" font-family="Arial" font-size="12" fill="#94a3b8">⚙</text>

  <!-- Centered Logo Area -->
  <rect x="342" y="60" width="116" height="50" rx="12" fill="#0d2d2a" stroke="#14b8a6" stroke-width="1" opacity="0.6"/>
  <text x="390" y="92" font-family="Arial" font-size="24" fill="#14b8a6" text-anchor="middle">✦</text>

  <!-- App Title -->
  <text x="400" y="140" font-family="Arial" font-size="28" font-weight="bold" fill="#14b8a6" text-anchor="middle">Fikir Kutusu</text>
  <text x="400" y="162" font-family="Arial" font-size="13" fill="#64748b" text-anchor="middle">Merak et, keşfet, ilham al</text>

  <!-- Divider line -->
  <line x1="350" y1="172" x2="450" y2="172" stroke="#14b8a6" stroke-width="1" opacity="0.4"/>

  <!-- Tab Bar -->
  <rect x="240" y="188" width="140" height="38" rx="19" fill="url(#activeTab)" stroke="#14b8a6" stroke-width="1.5"/>
  <rect x="242" y="190" width="134" height="34" rx="17" fill="#14b8a6" opacity="0.15"/>
  <text x="278" y="211" font-family="Arial" font-size="12" fill="#14b8a6" font-weight="600">🎓 Bilgi</text>

  <rect x="392" y="188" width="120" height="38" rx="19" fill="#1a2030" stroke="#334155" stroke-width="1"/>
  <text x="426" y="211" font-family="Arial" font-size="12" fill="#94a3b8">💡 Fikir</text>

  <!-- Info Card (Günlük limit) -->
  <rect x="240" y="242" width="320" height="120" rx="14" fill="#0f1e2e" stroke="#1e3a5f" stroke-width="1"/>
  <text x="400" y="282" font-family="Arial" font-size="22" text-anchor="middle">💡</text>
  <text x="400" y="306" font-family="Arial" font-size="14" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Günlük limitin doldu</text>
  <text x="400" y="326" font-family="Arial" font-size="11" fill="#64748b" text-anchor="middle">Limit gece yarısı sıfırlanır</text>
  <text x="400" y="343" font-family="Arial" font-size="11" fill="#475569" text-anchor="middle">veya gece yarısına kadar bekle</text>

  <!-- Search Bar -->
  <rect x="200" y="390" width="400" height="48" rx="24" fill="#0f1e2e" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="230" y="419" font-family="Arial" font-size="12" fill="#475569">🔍</text>
  <text x="252" y="419" font-family="Arial" font-size="12" fill="#475569">Neyi merak ediyorsun?</text>
  <rect x="522" y="398" width="66" height="32" rx="16" fill="url(#tealGrad)"/>
  <text x="541" y="419" font-family="Arial" font-size="11" fill="white" font-weight="600">Keşfet</text>

  <!-- Floating idea bubbles -->
  <circle cx="100" cy="220" r="35" fill="#0f2e2a" stroke="#14b8a6" stroke-width="1" opacity="0.5"/>
  <text x="82" y="225" font-family="Arial" font-size="11" fill="#14b8a6">Yapay</text>
  <text x="83" y="240" font-family="Arial" font-size="11" fill="#14b8a6">Zeka</text>

  <circle cx="700" cy="190" r="40" fill="#0f2e2a" stroke="#14b8a6" stroke-width="1" opacity="0.4"/>
  <text x="675" y="192" font-family="Arial" font-size="11" fill="#14b8a6">Bilim</text>
  <text x="671" y="207" font-family="Arial" font-size="11" fill="#14b8a6">Kurgu</text>

  <circle cx="110" cy="360" r="28" fill="#0f2e2a" stroke="#14b8a6" stroke-width="1" opacity="0.35"/>
  <text x="90" y="365" font-family="Arial" font-size="10" fill="#14b8a6">Teknoloji</text>

  <circle cx="700" cy="350" r="32" fill="#0f2e2a" stroke="#14b8a6" stroke-width="1" opacity="0.4"/>
  <text x="676" y="348" font-family="Arial" font-size="10" fill="#14b8a6">Felsefe</text>
  <text x="680" y="363" font-family="Arial" font-size="10" fill="#14b8a6">Tarihi</text>
</svg>
