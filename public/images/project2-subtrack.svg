<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#1c2128"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg2)"/>

  <!-- Top Nav -->
  <rect width="800" height="52" fill="#161b22"/>
  <rect x="0" y="51" width="800" height="1" fill="#30363d"/>

  <!-- Logo -->
  <rect x="20" y="12" width="28" height="28" rx="8" fill="url(#purpleGrad)"/>
  <text x="28" y="31" font-family="Arial" font-size="14" font-weight="bold" fill="white">S</text>
  <text x="56" y="31" font-family="Arial" font-size="14" font-weight="bold" fill="white">SubTrack</text>

  <!-- Nav Items -->
  <text x="220" y="31" font-family="Arial" font-size="12" fill="#8b949e">Abonelikler</text>
  <text x="310" y="31" font-family="Arial" font-size="12" fill="#8b949e">Takvim</text>

  <!-- User Info -->
  <rect x="660" y="10" width="90" height="32" rx="16" fill="#21262d"/>
  <circle cx="676" cy="26" r="10" fill="url(#purpleGrad)"/>
  <text x="671" y="30" font-family="Arial" font-size="9" font-weight="bold" fill="white">YY</text>
  <text x="692" y="30" font-family="Arial" font-size="11" fill="#e6edf3">Yüksel</text>

  <!-- Admin Badge -->
  <rect x="754" y="13" width="36" height="18" rx="9" fill="#7c3aed" opacity="0.2"/>
  <text x="762" y="25" font-family="Arial" font-size="9" fill="#a78bfa">Admin</text>

  <!-- Welcome Section -->
  <text x="40" y="92" font-family="Arial" font-size="20" font-weight="bold" fill="#e6edf3">Hoş Geldin, Yüksel 👋</text>
  <text x="40" y="112" font-family="Arial" font-size="12" fill="#8b949e">Abonelik özeti</text>

  <!-- New Add Button -->
  <rect x="664" y="73" width="96" height="34" rx="8" fill="url(#purpleGrad)"/>
  <text x="680" y="95" font-family="Arial" font-size="11" fill="white" font-weight="600">+ Yeni Ekle ↗</text>

  <!-- Stat Cards -->
  <!-- Card 1: Aktif -->
  <rect x="40" y="132" width="172" height="88" rx="12" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1"/>
  <text x="60" y="162" font-family="Arial" font-size="10" fill="#8b949e">💳  Aktif</text>
  <text x="60" y="196" font-family="Arial" font-size="30" font-weight="bold" fill="#e6edf3">0</text>
  <text x="102" y="196" font-family="Arial" font-size="12" fill="#8b949e">abonelik</text>

  <!-- Card 2: Aylık -->
  <rect x="224" y="132" width="172" height="88" rx="12" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1"/>
  <text x="244" y="162" font-family="Arial" font-size="10" fill="#8b949e">📅  Aylık</text>
  <text x="244" y="196" font-family="Arial" font-size="30" font-weight="bold" fill="#e6edf3">0.00₺</text>
  <text x="316" y="196" font-family="Arial" font-size="12" fill="#8b949e">toplam</text>

  <!-- Card 3: Yıllık -->
  <rect x="408" y="132" width="172" height="88" rx="12" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1"/>
  <text x="428" y="162" font-family="Arial" font-size="10" fill="#8b949e">📈  Yıllık</text>
  <text x="428" y="196" font-family="Arial" font-size="30" font-weight="bold" fill="#e6edf3">0₺</text>
  <text x="462" y="196" font-family="Arial" font-size="12" fill="#8b949e">tahmini</text>

  <!-- Card 4: Bugün -->
  <rect x="592" y="132" width="168" height="88" rx="12" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1"/>
  <text x="612" y="162" font-family="Arial" font-size="10" fill="#8b949e">🗓️  Bugün</text>
  <text x="612" y="196" font-family="Arial" font-size="22" font-weight="bold" fill="#e6edf3">17 Mar</text>

  <!-- Hızlı Erişim Panel -->
  <rect x="40" y="240" width="720" height="220" rx="12" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1"/>
  <text x="60" y="272" font-family="Arial" font-size="14" font-weight="bold" fill="#e6edf3">Hızlı Erişim</text>
  <rect x="40" y="280" width="720" height="1" fill="#30363d"/>

  <!-- Quick Access Items -->
  <!-- Item 1 -->
  <rect x="60" y="300" width="180" height="60" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <rect x="74" y="314" width="28" height="28" rx="8" fill="#7c3aed" opacity="0.2"/>
  <text x="82" y="333" font-family="Arial" font-size="14" fill="#a78bfa">+</text>
  <text x="110" y="328" font-family="Arial" font-size="12" font-weight="600" fill="#e6edf3">Abonelik Ekle</text>
  <text x="110" y="344" font-family="Arial" font-size="10" fill="#8b949e">Yeni abonelik kaydet</text>

  <!-- Item 2 -->
  <rect x="260" y="300" width="180" height="60" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <rect x="274" y="314" width="28" height="28" rx="8" fill="#7c3aed" opacity="0.2"/>
  <text x="281" y="333" font-family="Arial" font-size="12" fill="#a78bfa">☰</text>
  <text x="310" y="328" font-family="Arial" font-size="12" font-weight="600" fill="#e6edf3">Abonelikleri Gör</text>
  <text x="310" y="344" font-family="Arial" font-size="10" fill="#8b949e">Tümünü listele</text>

  <!-- Item 3 -->
  <rect x="460" y="300" width="180" height="60" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <rect x="474" y="314" width="28" height="28" rx="8" fill="#7c3aed" opacity="0.2"/>
  <text x="481" y="333" font-family="Arial" font-size="12" fill="#a78bfa">📅</text>
  <text x="510" y="328" font-family="Arial" font-size="12" font-weight="600" fill="#e6edf3">Takvim</text>
  <text x="510" y="344" font-family="Arial" font-size="10" fill="#8b949e">Ödeme günleri</text>

  <!-- Coming Soon badges -->
  <rect x="640" y="380" width="100" height="28" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="658" y="398" font-family="Arial" font-size="10" fill="#8b949e">Yakında daha fazla...</text>
</svg>
