<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="profileGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.3" />
    </linearGradient>
  </defs>

  <!-- Outer glow circle -->
  <circle cx="100" cy="100" r="98" fill="none" stroke="url(#glowGradient)" stroke-width="2" opacity="0.6"/>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#profileGradient)"/>

  <!-- Head -->
  <circle cx="100" cy="70" r="35" fill="#f5f5f5"/>

  <!-- Shoulders/Body -->
  <ellipse cx="100" cy="130" rx="45" ry="50" fill="#f5f5f5"/>

  <!-- Initials -->
  <text x="100" y="80" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="url(#profileGradient)" text-anchor="middle" dominant-baseline="central">
    YY
  </text>

  <!-- Accent line -->
  <line x1="65" y1="55" x2="135" y2="55" stroke="#e5e5e5" stroke-width="1" opacity="0.5"/>

  <!-- Decorative corners -->
  <circle cx="30" cy="30" r="3" fill="#e5e5e5" opacity="0.4"/>
  <circle cx="170" cy="30" r="3" fill="#e5e5e5" opacity="0.4"/>
  <circle cx="30" cy="170" r="3" fill="#e5e5e5" opacity="0.4"/>
  <circle cx="170" cy="170" r="3" fill="#e5e5e5" opacity="0.4"/>
</svg>
