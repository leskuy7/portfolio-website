<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="darkbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#111827"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="purpleText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#darkbg)"/>

  <!-- Navbar -->
  <rect width="800" height="52" fill="#111827"/>
  <text x="30" y="32" font-family="Arial" font-size="13" font-weight="bold" fill="white" letter-spacing="1">VARDIYA V2</text>
  <circle cx="752" cy="26" r="10" fill="#374151"/>
  <text x="746" y="30" font-family="Arial" font-size="11" fill="#f59e0b">☀</text>
  <rect x="670" y="12" width="70" height="28" rx="14" fill="url(#btnGrad)"/>
  <text x="685" y="30" font-family="Arial" font-size="11" fill="white" font-weight="600">Giriş Yap</text>

  <!-- Hero Section -->
  <rect x="30" y="68" width="740" height="220" rx="16" fill="url(#heroGrad)"/>

  <!-- Yeni Nesil Badge -->
  <rect x="56" y="88" width="200" height="26" rx="13" fill="#4f46e5" opacity="0.3" stroke="#6366f1" stroke-width="1"/>
  <text x="72" y="105" font-family="Arial" font-size="11" fill="#a5b4fc" font-weight="600">YENİ NESİL VARDİYA YÖNETİMİ</text>

  <!-- Hero Headline -->
  <text x="56" y="150" font-family="Arial" font-size="26" font-weight="bold" fill="white">Ekibinizi </text>
  <text x="178" y="150" font-family="Arial" font-size="26" font-weight="bold" fill="#818cf8">akıllıca </text>
  <text x="298" y="150" font-family="Arial" font-size="26" font-weight="bold" fill="white">yönetin.</text>

  <!-- Sub text -->
  <text x="56" y="180" font-family="Arial" font-size="12" fill="#a5b4fc">Sürükle-bırak planlama, gerçek zamanlı takip, izin ve mesai</text>
  <text x="56" y="198" font-family="Arial" font-size="12" fill="#a5b4fc">kuralları ile operasyonu tek panelden yönetin.</text>

  <!-- CTA Buttons -->
  <rect x="56" y="218" width="120" height="36" rx="18" fill="url(#btnGrad)"/>
  <text x="84" y="241" font-family="Arial" font-size="12" fill="white" font-weight="600">Hemen Başla</text>

  <rect x="188" y="218" width="110" height="36" rx="18" fill="transparent" stroke="#4b5563" stroke-width="1.5"/>
  <text x="214" y="241" font-family="Arial" font-size="12" fill="#d1d5db" font-weight="500">Demo Dene</text>

