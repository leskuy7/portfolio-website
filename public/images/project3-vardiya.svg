  <rect x="30" y="308" width="172" height="96" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="44" y="322" width="60" height="18" rx="9" fill="#4f46e5" opacity="0.2"/>
  <text x="50" y="335" font-family="Arial" font-size="9" fill="#818cf8" font-weight="600">ÖZELLİK</text>
  <text x="44" y="360" font-family="Arial" font-size="13" font-weight="bold" fill="white">Haftalık</text>
  <text x="44" y="376" font-family="Arial" font-size="13" font-weight="bold" fill="white">Planlama</text>
  <text x="44" y="394" font-family="Arial" font-size="10" fill="#64748b">Sürükle-bırak grid</text>

  <rect x="214" y="308" width="172" height="96" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="228" y="322" width="60" height="18" rx="9" fill="#4f46e5" opacity="0.2"/>
  <text x="234" y="335" font-family="Arial" font-size="9" fill="#818cf8" font-weight="600">ÖZELLİK</text>
  <text x="228" y="360" font-family="Arial" font-size="13" font-weight="bold" fill="white">Çalışan</text>
  <text x="228" y="376" font-family="Arial" font-size="13" font-weight="bold" fill="white">Takibi</text>
  <text x="228" y="394" font-family="Arial" font-size="10" fill="#64748b">Rol bazlı erişim</text>

  <rect x="398" y="308" width="172" height="96" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="412" y="322" width="60" height="18" rx="9" fill="#4f46e5" opacity="0.2"/>
  <text x="418" y="335" font-family="Arial" font-size="9" fill="#818cf8" font-weight="600">ÖZELLİK</text>
  <text x="412" y="360" font-family="Arial" font-size="13" font-weight="bold" fill="white">Akıllı</text>
  <text x="412" y="376" font-family="Arial" font-size="13" font-weight="bold" fill="white">Raporlama</text>
  <text x="412" y="394" font-family="Arial" font-size="10" fill="#64748b">Mesai analizi</text>

  <rect x="582" y="308" width="188" height="96" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="596" y="322" width="60" height="18" rx="9" fill="#4f46e5" opacity="0.2"/>
  <text x="602" y="335" font-family="Arial" font-size="9" fill="#818cf8" font-weight="600">ÖZELLİK</text>
  <text x="596" y="360" font-family="Arial" font-size="13" font-weight="bold" fill="white">Güvenli</text>
  <text x="596" y="376" font-family="Arial" font-size="13" font-weight="bold" fill="white">Yönetim</text>
  <text x="596" y="394" font-family="Arial" font-size="10" fill="#64748b">RBAC, CSRF koruması</text>

  <!-- Bottom Bar -->
  <rect x="0" y="420" width="800" height="80" fill="#0a0f1a"/>
  <rect x="0" y="420" width="800" height="1" fill="#1e293b"/>
  <text x="280" y="458" font-family="Arial" font-size="12" fill="#4b5563">Ekip verimliliğini artırmak için tasarlandı</text>
  <text x="318" y="478" font-family="Arial" font-size="11" fill="#6366f1">vardiyav2.vercel.app</text>
